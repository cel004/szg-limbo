<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Syzygy Production Lab: 404 NOT FOUND Exhibition</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/png" href="assets/limbo-favicon.png">
    </head>
    <body class="ticket-page" style="background-color: white; background-image: none !important;">
        <header>
            <a href="index.html">
                <img class="header-logo" src="assets/limbo-com.png" alt="Syzygy Production Lab Limbo Logo" width="300" style="padding-top: 1rem;">
            </a>
            <nav>
                <ul>
                    <li><button onclick="location.href='ticket-page.html'" style="background-color: #ff00ff;">Buy Tickets</button></li>
                    <li><button onclick="window.open('https://www.instagram.com/sizigi.zip/', '_blank')">Syzygy Production Lab</button></li>
                </ul>
            </nav>
        </header>
        <main class="ticket-page-main">
            <h2 style="color: #0000ff; padding: 2rem 0 1.5rem 0;">Join Limbo.com</h2>
            <form class="username-form ticket-width">
                <label for="name" style="font-size: 18.72px;">Username:</label>
                <input type="text" id="name" name="name" required placeholder="nerdypanda210">
            </form>

            <div class="yellow-container ticket-width avatar-title">
                <h3>Choose an avatar</h3>
            </div>

            <div class="content-container ticket-width">
                <div class="avatar-grid">
                    <img src="assets/fish/fish1-8.png" class="avatar" alt="Fish">
                    <img src="assets/fish/fish2-8.png" class="avatar" alt="Fish">
                    <img src="assets/fish/fish3-8.png" class="avatar" alt="Fish">
                    <img src="assets/fish/fish4-8.png" class="avatar" alt="Fish">
                    <img src="assets/fish/fish5-8.png" class="avatar" alt="Fish">
                    <img src="assets/fish/fish6-8.png" class="avatar" alt="Fish">
                    <img src="assets/fish/fish7-8.png" class="avatar" alt="Fish">
                    <img src="assets/fish/fish8-8.png" class="avatar" alt="Fish">
                    <img src="assets/fish/fish9-8.png" class="avatar" alt="Fish">
                    <img src="assets/fish/fish10-8.png" class="avatar" alt="Fish">
                </div>
            </div>

            <button type="button" id="saveVisitor" style="padding: 0.2rem 1.8rem; margin-top: 1.5rem; text-decoration: none; color: #000000;">Save</button>
            <p style="font-weight:600; margin-top: 2rem;">To finish joining Limbo.com please purchase a ticket:</p>
            <ul class="ticket-page__cta-list">
                <li><button id="buyTicket" onclick="window.open('https://square.link/u/xhyVZzk9?src=sheet', '_blank')"
                    style="padding: 0.2rem 1.8rem; margin-top: 0.8rem; text-decoration: none; color: #000000;">Buy ticket</button></li>
            </ul>
            <div id="saveThankYou" class="ticket-thank-you" aria-live="polite">
                <h2 class="ticket-thank-you__title">Thank you for joining Limbo.com</h2>
                <a href="index.html" class="ticket-thank-you__cta">View Limbo</a>
                <p class="ticket-thank-you__note" id="saveVisitorNote"></p>
            </div>
        </main>
        <footer id="footer">
            © <span id="year"></span> Syzygy Production Lab
        </footer>
        <script src="js/aquarium-config.js"></script>
        <script src="js/aquarium-backend.js"></script>
        <script>
        const avatars = document.querySelectorAll('.avatar');

        avatars.forEach(avatar => {
            avatar.addEventListener('click', () => {
                avatars.forEach(a => a.classList.remove('selected'));
                avatar.classList.add('selected');
            });
        });

        const buyTicketBtn = document.getElementById('buyTicket');
        const saveThankYouBlock = document.getElementById('saveThankYou');
        if (buyTicketBtn && saveThankYouBlock) {
            buyTicketBtn.addEventListener('click', function () {
                saveThankYouBlock.classList.add('is-visible');
            });
        }

        function isTooClose(candidate, existing, minDist) {
            return existing.some((other) => {
                if (!other || typeof other.leftPct !== 'number' || typeof other.topPct !== 'number') return false;
                var dx = candidate.leftPct - other.leftPct;
                var dy = candidate.topPct - other.topPct;
                return Math.sqrt(dx * dx + dy * dy) < minDist;
            });
        }

        function getRandomPoint(bounds) {
            return {
                leftPct: bounds.leftMin + Math.random() * (bounds.leftMax - bounds.leftMin),
                topPct: bounds.topMin + Math.random() * (bounds.topMax - bounds.topMin)
            };
        }

        function findSpawnPosition(existingGuests, bounds, minDist, maxAttempts) {
            var existing = Array.isArray(existingGuests) ? existingGuests : [];
            for (var i = 0; i < maxAttempts; i++) {
                var candidate = getRandomPoint(bounds);
                if (!isTooClose(candidate, existing, minDist)) {
                    return candidate;
                }
            }
            // Fallback: use a sparse grid scan if random retries fail
            var cols = 8;
            var rows = 6;
            for (var r = 0; r < rows; r++) {
                for (var c = 0; c < cols; c++) {
                    var candidate = {
                        leftPct: bounds.leftMin + (bounds.leftMax - bounds.leftMin) * (c / Math.max(cols - 1, 1)),
                        topPct: bounds.topMin + (bounds.topMax - bounds.topMin) * (r / Math.max(rows - 1, 1))
                    };
                    if (!isTooClose(candidate, existing, minDist)) {
                        return candidate;
                    }
                }
            }
            // Ultimate fallback: any random point
            return getRandomPoint(bounds);
        }

        document.getElementById('saveVisitor').addEventListener('click', () => {
            const nameInput = document.getElementById('name');
            const username = (nameInput && nameInput.value || '').trim();
            const selected = document.querySelector('.avatar.selected');

            if (!username) {
                alert('Please enter a username.');
                if (nameInput) nameInput.focus();
                return;
            }
            if (!selected) {
                alert('Please choose an avatar.');
                return;
            }

            const normalizedUsername = username.toLowerCase();

            const btn = document.getElementById('saveVisitor');
            if (btn) btn.disabled = true;

            LimboAquarium.loadGuests().then((guests) => {
                const exists = Array.isArray(guests) && guests.some((g) => {
                    const existing = (g && g.username ? String(g.username) : '').trim().toLowerCase();
                    return existing && existing === normalizedUsername;
                });
                if (exists) {
                    throw new Error('Username taken. Please choose another one.');
                }

                const spawn = findSpawnPosition(
                    guests,
                    { leftMin: 12, leftMax: 88, topMin: 14, topMax: 86 },
                    12,
                    150
                );

                const guest = {
                    username: username,
                    avatarSrc: selected.getAttribute('src') || '',
                    leftPct: spawn.leftPct,
                    topPct: spawn.topPct
                };

                return LimboAquarium.addGuest(guest);
            }).then(() => {
                const block = document.getElementById('saveThankYou');
                const note = document.getElementById('saveVisitorNote');
                if (!block) return;
                if (note) {
                    if (!LimboAquarium.isRemote()) {
                        const d = typeof LimboAquarium.diagnose === 'function' ? LimboAquarium.diagnose() : null;
                        const hint = d && d.reasons && d.reasons.length ? d.reasons.join(' · ') : 'URL/key not detected.';
                        note.innerHTML =
                            'Saved on this device only — shared aquarium needs Supabase. ' +
                            'Push <code>js/aquarium-config.js</code> or set <code>EMBEDDED_SUPABASE</code> in <code>js/aquarium-backend.js</code>. ' +
                            '<span style="font-weight:700;">(' + hint + ')</span>';
                    } else {
                        note.textContent = '';
                    }
                }
            }).catch((err) => {
                alert(err && err.message ? err.message : 'Could not save. Try again.');
            }).finally(() => {
                if (btn) btn.disabled = false;
            });
        });

        document.getElementById("year").textContent = new Date().getFullYear();
        </script>
    </body>
</html>
